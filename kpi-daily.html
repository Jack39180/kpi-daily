<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPI รายวัน — ทีม Marketing</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4ff;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    /* ---- Login Screen ---- */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(59,59,152,0.12);
    }
    .login-card h1 { font-size: 1.6rem; font-weight: 700; color: #3b3b98; margin-bottom: 8px; }
    .login-card p { color: #888; font-size: 0.92rem; margin-bottom: 32px; }
    .login-card .icon { font-size: 3rem; margin-bottom: 16px; }

    /* ---- Main App ---- */
    #app { display: none; }

    /* ---- User bar ---- */
    .user-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      max-width: 640px;
      margin: 0 auto 20px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .user-name { font-size: 0.88rem; font-weight: 600; color: #444; }
    .btn-logout {
      background: none;
      border: 1.5px solid #dde1f0;
      color: #888;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: #e04a4a; color: #e04a4a; }

    /* ---- Header ---- */
    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .page-header h1 { font-size: 1.8rem; font-weight: 700; color: #3b3b98; }
    .page-header p { color: #666; margin-top: 6px; font-size: 0.95rem; }

    /* ---- Card ---- */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 640px;
      margin: 0 auto 32px;
      box-shadow: 0 4px 24px rgba(59,59,152,0.08);
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #3b3b98;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ---- Form ---- */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    label span.required { color: #e04a4a; margin-left: 2px; }

    input[type="text"],
    input[type="url"],
    select,
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #dde1f0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a2e;
      background: #fafbff;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #5c6bc0;
      box-shadow: 0 0 0 3px rgba(92,107,192,0.12);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 100px; }
    select { cursor: pointer; }

    /* ---- Date badge ---- */
    .date-badge {
      display: inline-block;
      background: #eef0ff;
      color: #3b3b98;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .date-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    /* ---- Submit ---- */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #5c6bc0, #3b3b98);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:active { transform: scale(0.98); }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2e7d32;
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="icon">📊</div>
    <h1>KPI รายวัน</h1>
    <p>ทีม Marketing<br>กรุณา Login ด้วย Google Account ก่อนกรอกข้อมูล</p>
    <div id="g_id_onload"
      data-client_id="188193578686-4q5uaj2gg226i8jaroa39dl39nq41afk.apps.googleusercontent.com"
      data-callback="onGoogleLogin"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-size="large"
      data-theme="outline"
      data-text="sign_in_with"
      data-shape="rectangular"
      data-logo_alignment="left">
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="user-bar">
    <img id="user-avatar" class="user-avatar" src="" alt="" />
    <span class="user-name" id="user-name"></span>
    <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
  </div>

  <div class="page-header">
    <h1>📊 KPI รายวัน</h1>
    <p>ทีม Marketing — กรอกสรุปงานประจำวัน</p>
  </div>

  <div class="card">
    <h2>📝 กรอกข้อมูลวันนี้</h2>
    <div class="date-row">
      <div class="date-badge" id="today-label"></div>
      <div class="date-badge" id="time-label">🕐 00:00:00</div>
    </div>

    <form id="kpi-form">
      <div class="form-group">
        <label>ชื่อ <span class="required">*</span></label>
        <input type="text" id="f-name" placeholder="กรอกชื่อ-นามสกุล" required />
      </div>

      <div class="form-group">
        <label>ตำแหน่ง <span class="required">*</span></label>
        <select id="f-role" required>
          <option value="">— เลือกตำแหน่ง —</option>
          <option>Marketing</option>
          <option>Graphic</option>
          <option>Editing</option>
          <option>Creative</option>
        </select>
      </div>

      <div class="form-group">
        <label>สรุปงานวันนี้ <span class="required">*</span></label>
        <textarea id="f-summary" placeholder="อธิบายสิ่งที่ทำในวันนี้..." required></textarea>
      </div>

      <div class="form-group">
        <label>ลิ้งงาน</label>
        <input type="url" id="f-link" placeholder="https://..." />
      </div>

      <div class="form-group">
        <label>ข้อเสนอแนะ</label>
        <textarea id="f-feedback" placeholder="มีอะไรที่อยากแนะนำ หรือปัญหาที่เจอ..."></textarea>
      </div>

      <button type="submit" class="btn-submit">✅ ส่ง KPI วันนี้</button>
    </form>
  </div>
</div>

<div id="toast">✅ ส่ง KPI สำเร็จแล้ว!</div>

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyhyW9e_jI9mVS8bO1jHbgKqY4bXDDjs86mRR8WcV5CozlYKmtv6p4VYF3lXcDodIrI0w/exec';

  /* ---- Google Login Callback ---- */
  function onGoogleLogin(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const user = {
      name: payload.name,
      email: payload.email,
      picture: payload.picture
    };
    sessionStorage.setItem('kpi_user', JSON.stringify(user));
    showApp(user);
  }

  function showApp(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name').textContent = user.name + ' (' + user.email + ')';
    document.getElementById('user-avatar').src = user.picture;
    document.getElementById('f-name').value = user.name;
  }

  function logout() {
    sessionStorage.removeItem('kpi_user');
    location.reload();
  }

  /* ---- Auto-restore session ---- */
  const savedUser = sessionStorage.getItem('kpi_user');
  if (savedUser) showApp(JSON.parse(savedUser));

  /* ---- Live clock ---- */
  function updateClock() {
    const now = new Date();
    document.getElementById('today-label').textContent =
      now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('time-label').textContent =
      '🕐 ' + now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  /* ---- Submit ---- */
  document.getElementById('kpi-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const user = JSON.parse(sessionStorage.getItem('kpi_user') || '{}');
    const entry = {
      timestamp: new Date().toISOString(),
      name: document.getElementById('f-name').value.trim(),
      email: user.email || '',
      role: document.getElementById('f-role').value,
      summary: document.getElementById('f-summary').value.trim(),
      link: document.getElementById('f-link').value.trim(),
      feedback: document.getElementById('f-feedback').value.trim(),
    };

    fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    }).catch(err => console.error('Sheet error:', err));

    this.reset();
    document.getElementById('f-role').value = '';
    document.getElementById('f-name').value = user.name || '';
    showToast();
  });

  /* ---- Toast ---- */
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
